[build]
command = "npm run build"
publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy    = "upgrade-insecure-requests"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options     = "nosniff"
    X-Frame-Options            = "DENY"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), publickey-credentials-get=()"
    Link                       = '''</sitemap.xml>; rel="sitemap", </llms.txt>; rel="alternate"; type="text/plain", </.well-known/api-catalog>; rel="api-catalog", </schemamap.xml>; rel="schemamap"'''

[[headers]]
  for = "/.well-known/api-catalog"
  [headers.values]
    Content-Type   = "application/linkset+json"
    Cache-Control  = "public, max-age=300"
